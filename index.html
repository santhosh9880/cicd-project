<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>SRS Enterprises | JP Nagar Bangalore</title>

		<!-- Google Fonts -->
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

		<!-- Font Awesome Icons -->

<style>

*{
	    margin:0;
	        padding:0;
		    box-sizing:border-box;
		        font-family: 'Poppins', sans-serif;
			    scroll-behavior:smooth;
}

body{
	    background:#f4f6f9;
	        color:#333;
}

/* ===== NAVBAR ===== */
nav{
	    display:flex;
	        justify-content:space-between;
		    align-items:center;
		        padding:15px 60px;
			    background:#0d1b2a;
			        position:sticky;
				    top:0;
				        z-index:1000;
}

nav h2{
	    color:#fff;
}

nav ul{
	    list-style:none;
	        display:flex;
		    gap:25px;
}

nav ul li a{
	    color:#fff;
	        text-decoration:none;
		    font-weight:500;
		        transition:0.3s;
}

nav ul li a:hover{
	    color:#00b4d8;
}

/* ===== HERO SECTION ===== */
.hero{
	    height:90vh;
	        background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
		    url('https://images.unsplash.com/photo-1508780709619-79562169bc64');
		        background-size:cover;
			    background-position:center;
			        display:flex;
				    justify-content:center;
				        align-items:center;
					    text-align:center;
					        color:#fff;
						    padding:20px;
}

.hero h1{
	    font-size:48px;
}

.hero p{
	    margin:20px 0;
	        font-size:18px;
}

.btn{
	    padding:12px 25px;
	        background:#00b4d8;
		    color:#fff;
		        border:none;
			    border-radius:30px;
			        text-decoration:none;
				    font-weight:600;
				        transition:0.3s;
}

.btn:hover{
	    background:#0096c7;
}

/* ===== SECTION ===== */
section{
	    padding:80px 10%;
	        text-align:center;
}

.section-title{
	    font-size:32px;
	        margin-bottom:40px;
		    color:#0d1b2a;
}

/* ===== SERVICES ===== */
#services {
	    padding: 80px 10%;
	        background: #f8f9fa;
}

.section-title {
	    text-align: center;
	        font-size: 36px;
		    margin-bottom: 60px;
		        font-weight: 600;
}

.service-item {
	    display: flex;
	        align-items: center;
		    gap: 50px;
		        margin-bottom: 70px;
}

.service-item.reverse {
	    flex-direction: row-reverse;
}

.service-image img {
	    width: 450px;
	        height: 300px;
		    object-fit: cover;
		        border-radius: 12px;
			    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.service-content {
	    max-width: 500px;
}

.service-content h3 {
	    font-size: 26px;
	        margin-bottom: 15px;
}

.service-content p {
	    color: #555;
	        margin-bottom: 20px;
		    line-height: 1.6;
}

.btn {
	    display: inline-block;
	        padding: 10px 20px;
		    background: #007bff;
		        color: #fff;
			    text-decoration: none;
			        border-radius: 6px;
				    transition: 0.3s;
}

.btn:hover {
	    background: #0056b3;
}

.whatsapp-btn {
	    background: #25D366;
}

.whatsapp-btn:hover {
	    background: #1ebe5d;
}

/* Responsive */
@media (max-width: 992px) {
	    .service-item,
	        .service-item.reverse {
			        flex-direction: column;
				        text-align: center;
					    }

		    .service-image img {
			            width: 100%;
				            height: auto;
					        }
}

/* ===== CONTACT ===== */
.contact form{
	    max-width:600px;
	        margin:auto;
		    display:flex;
		        flex-direction:column;
			    gap:15px;
}

.contact input,
.contact textarea{
	    padding:12px;
	        border-radius:8px;
		    border:1px solid #ccc;
		        font-size:14px;
}

.contact button{
	    background:#0d1b2a;
	        color:#fff;
		    padding:12px;
		        border:none;
			    border-radius:25px;
			        cursor:pointer;
				    transition:0.3s;
}

.contact button:hover{
	    background:#00b4d8;
}

/* ===== FOOTER ===== */
footer{
	    background:#0d1b2a;
	        color:#fff;
		    text-align:center;
		        padding:20px;
			    margin-top:40px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
	    nav{
		            flex-direction:column;
			            gap:10px;
				        }

	        .hero h1{
			        font-size:32px;
				    }
}

</style>
	</head>
